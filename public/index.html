<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Database Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <aside class="sidebar">
      <h2>STD DBMS</h2>
      <p>Manage student records easily</p>

      <div class="stats">
        <h3 id="totalStudents">0</h3>
        <span>Total Students</span>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1>Student Database Management System</h1>
          <p>Add, update, search and delete student records</p>
        </div>
      </div>

      <section class="card">
        <h2 id="formTitle">Add Student</h2>

        <form id="studentForm">
          <input type="hidden" id="studentId" />

          <div class="form-grid">
            <input type="text" id="name" placeholder="Student Name" required />
            <input type="text" id="rollNo" placeholder="Roll Number" required />
            <input type="email" id="email" placeholder="Email Address" required />
            <input type="text" id="course" placeholder="Course" required />
            <input type="text" id="semester" placeholder="Semester" required />
          </div>

          <div class="buttons">
            <button type="submit" id="submitBtn">Add Student</button>
            <button type="button" id="cancelBtn" onclick="resetForm()">Cancel</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="table-header">
          <h2>Student Records</h2>
          <input type="text" id="searchInput" placeholder="Search by name, roll no, course..." />
        </div>

        <div class="table-box">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Email</th>
                <th>Course</th>
                <th>Semester</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
